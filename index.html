<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>2048</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
}
body {
  background-color: #faf8ef;
  color: #776e65;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  touch-action: manipulation; /* 修复触摸响应延迟 */
}
.container {
  max-width: 500px;
  width: 100%;
}
.heading {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.title {
  font-size: 80px;
  font-weight: bold;
  color: #776e65;
  line-height: 1;
}
.scores-container {
  display: flex;
  gap: 10px;
}
.score-container, .best-container {
  background-color: #bbada0;
  border-radius: 3px;
  padding: 10px 15px;
  text-align: center;
  color: white;
  min-width: 80px;
}
.score-label {
  font-size: 12px;
  text-transform: uppercase;
  color: #eee4da;
}
.value {
  font-size: 24px;
  font-weight: bold;
  line-height: 1.2;
}
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.subtitle {
  font-size: 18px;
  color: #776e65;
}
.restart-button {
  background-color: #8f7a66;
  color: white;
  border: none;
  border-radius: 3px;
  padding: 8px 16px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background-color 0.2s;
  outline: none; /* 移除默认轮廓 */
}
.restart-button:hover {
  background-color: #78695d;
}
.game-container {
  position: relative;
  width: 100%;
  padding-bottom: 100%;
  border-radius: 6px;
  background-color: #bbada0;
  margin-bottom: 20px;
  touch-action: none; /* 禁用浏览器默认触摸行为 */
}
.grid-container {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 16px;
  display: grid;
  grid-template-rows: repeat(4, 1fr);
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.grid-cell {
  background-color: rgba(238, 228, 218, 0.35);
  border-radius: 3px;
}
.tile-container {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 16px;
  pointer-events: none;
}
.tile {
  position: absolute;
  width: calc(25% - 12px);
  height: calc(25% - 12px);
  border-radius: 3px;
  background-color: #eee4da;
  color: #776e65;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: bold;
  transition: transform 0.2s, opacity 0.2s;
  pointer-events: none;
  z-index: 10;
}
/* 方块颜色样式 */
.tile-2 { background-color: #eee4da; }
.tile-4 { background-color: #ede0c8; }
.tile-8 { background-color: #f2b179; color: white; }
.tile-16 { background-color: #f59563; color: white; }
.tile-32 { background-color: #f67c5f; color: white; }
.tile-64 { background-color: #f65e3b; color: white; }
.tile-128 { background-color: #edcf72; color: white; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.31); }
.tile-256 { background-color: #edcc61; color: white; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.41); }
.tile-512 { background-color: #edc850; color: white; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.51); }
.tile-1024 { background-color: #edc53f; color: white; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.61); font-size: 24px; }
.tile-2048 { background-color: #edc22e; color: white; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.71); font-size: 24px; }
.tile-super { background-color: #3c3a32; color: white; font-size: 18px; }
.game-message {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(238, 228, 218, 0.73);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.game-message.active {
  opacity: 1;
  pointer-events: auto;
}
.game-message p {
  font-size: 48px;
  font-weight: bold;
  color: #776e65;
  margin-bottom: 20px;
}
.lower {
  display: flex;
  gap: 10px;
}
.keep-playing-button, .retry-button {
  background-color: #8f7a66;
  color: white;
  border: none;
  border-radius: 3px;
  padding: 10px 20px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background-color 0.2s;
  outline: none;
}
.keep-playing-button:hover, .retry-button:hover {
  background-color: #78695d;
}
.game-explanation {
  font-size: 16px;
  text-align: center;
  max-width: 500px;
  line-height: 1.5;
}
/* 响应式适配 */
@media (max-width: 480px) {
  .title { font-size: 60px; }
  .grid-container { padding: 8px; gap: 8px; }
  .tile-container { padding: 8px; }
  .tile { font-size: 24px; }
  .tile-1024 { font-size: 18px; }
  .tile-2048 { font-size: 18px; }
  .game-message p { font-size: 36px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="heading">
	<h1 class="title">2048</h1>
	<div class="scores-container">
	  <div class="score-container">
		<label class="score-label">分数</label>
		<div class="value" id="score">0</div>
	  </div>
	  <div class="best-container">
		<label class="score-label">最高分</label>
		<div class="value" id="best">0</div>
	  </div>
	</div>
  </div>
  <div class="controls">
	<h2 class="subtitle">合并数字，得到2048！</h2>
	<button class="restart-button" id="restart-button">重新开始</button>
  </div>
  <div class="game-container" id="game-container">
	<div class="game-message" id="game-over-message">
	  <p>游戏结束！</p>
	  <div class="lower">
		<button class="retry-button" id="retry-button">再来一次</button>
	  </div>
	</div>
	<div class="game-message" id="game-win-message">
	  <p>你赢了！</p>
	  <div class="lower">
		<button class="keep-playing-button" id="keep-playing-button">继续挑战</button>
		<button class="retry-button" id="win-retry-button">再来一次</button>
	  </div>
	</div>
	<div class="grid-container">
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	  <div class="grid-cell"></div>
	</div>
	<div class="tile-container" id="tile-container"></div>
  </div>
  <p class="game-explanation">
	<strong>操作说明：</strong>使用<strong>方向键</strong>（或手机<strong>滑动</strong>）移动方块，相同数字的方块相撞后会合并成一个！
  </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const GRID_SIZE = 4;
  const tileContainer = document.getElementById('tile-container');
  const scoreElement = document.getElementById('score');
  const bestElement = document.getElementById('best');
  const restartButton = document.getElementById('restart-button');
  const retryButton = document.getElementById('retry-button');
  const winRetryButton = document.getElementById('win-retry-button');
  const keepPlayingButton = document.getElementById('keep-playing-button');
  const gameOverMessage = document.getElementById('game-over-message');
  const gameWinMessage = document.getElementById('game-win-message');
  const gameContainer = document.getElementById('game-container');
  
  let grid = [];
  let score = 0;
  let bestScore = localStorage.getItem('2048-best-score') || 0;
  let gameOver = false;
  let gameWon = false;
  let keepPlaying = false;
  let touchStartX = 0;
  let touchStartY = 0;
  
  // 初始化最高分
  bestElement.textContent = bestScore;
  
  // 初始化网格
  function initGrid() {
	grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
  }
  
  // 随机生成方块（修复生成逻辑，确保必生成）
  function generateRandomTile() {
	const emptyCells = [];
	for (let row = 0; row < GRID_SIZE; row++) {
	  for (let col = 0; col < GRID_SIZE; col++) {
		if (grid[row][col] === null) {
		  emptyCells.push([row, col]);
		}
	  }
	}
	
	if (emptyCells.length === 0) return false;
	
	const [row, col] = emptyCells[Math.floor(Math.random() * emptyCells.length)];
	grid[row][col] = Math.random() < 0.9 ? 2 : 4;
	renderTile(row, col, grid[row][col]);
	return true;
  }
  
  // 渲染方块（修复位置计算bug）
  function renderTile(row, col, value) {
	const tile = document.createElement('div');
	tile.classList.add('tile', `tile-${value}`);
	tile.textContent = value;
	
	const padding = 16;
	const containerSize = gameContainer.clientWidth;
	const tileSize = (containerSize - (padding * (GRID_SIZE + 1))) / GRID_SIZE;
	tile.style.width = `${tileSize}px`;
	tile.style.height = `${tileSize}px`;
	tile.style.left = `${padding + col * (tileSize + padding)}px`;
	tile.style.top = `${padding + row * (tileSize + padding)}px`;
	
	// 修复动画效果
	tile.style.opacity = '0';
	tile.style.transform = 'scale(0.8)';
	setTimeout(() => {
	  tile.style.opacity = '1';
	  tile.style.transform = 'scale(1)';
	}, 50);
	
	tileContainer.appendChild(tile);
	return tile;
  }
  
  // 更新网格
  function updateGrid() {
	tileContainer.innerHTML = '';
	for (let row = 0; row < GRID_SIZE; row++) {
	  for (let col = 0; col < GRID_SIZE; col++) {
		if (grid[row][col] !== null) {
		  renderTile(row, col, grid[row][col]);
		}
	  }
	}
  }
  
  // 更新分数
  function updateScore(points) {
	score += points;
	scoreElement.textContent = score;
	if (score > bestScore) {
	  bestScore = score;
	  bestElement.textContent = bestScore;
	  localStorage.setItem('2048-best-score', bestScore);
	}
  }
  
  // 移动方块（修复移动逻辑，确保响应）
  function moveTiles(direction) {
	if (gameOver && !keepPlaying) return false;
	let moved = false;
	let newGrid = JSON.parse(JSON.stringify(grid));
	
	switch (direction) {
	  case 'up':
		for (let col = 0; col < GRID_SIZE; col++) {
		  const column = [];
		  for (let row = 0; row < GRID_SIZE; row++) {
			if (newGrid[row][col] !== null) column.push(newGrid[row][col]);
		  }
		  const merged = mergeTiles(column);
		  for (let row = 0; row < GRID_SIZE; row++) {
			newGrid[row][col] = merged[row] || null;
		  }
		}
		break;
	  case 'down':
		for (let col = 0; col < GRID_SIZE; col++) {
		  const column = [];
		  for (let row = GRID_SIZE - 1; row >= 0; row--) {
			if (newGrid[row][col] !== null) column.push(newGrid[row][col]);
		  }
		  const merged = mergeTiles(column);
		  for (let row = GRID_SIZE - 1; row >= 0; row--) {
			newGrid[row][col] = merged[GRID_SIZE - 1 - row] || null;
		  }
		}
		break;
	  case 'left':
		for (let row = 0; row < GRID_SIZE; row++) {
		  const rowTiles = [];
		  for (let col = 0; col < GRID_SIZE; col++) {
			if (newGrid[row][col] !== null) rowTiles.push(newGrid[row][col]);
		  }
		  const merged = mergeTiles(rowTiles);
		  for (let col = 0; col < GRID_SIZE; col++) {
			newGrid[row][col] = merged[col] || null;
		  }
		}
		break;
	  case 'right':
		for (let row = 0; row < GRID_SIZE; row++) {
		  const rowTiles = [];
		  for (let col = GRID_SIZE - 1; col >= 0; col--) {
			if (newGrid[row][col] !== null) rowTiles.push(newGrid[row][col]);
		  }
		  const merged = mergeTiles(rowTiles);
		  for (let col = GRID_SIZE - 1; col >= 0; col--) {
			newGrid[row][col] = merged[GRID_SIZE - 1 - col] || null;
		  }
		}
		break;
	}
	
	if (JSON.stringify(grid) !== JSON.stringify(newGrid)) {
	  grid = newGrid;
	  updateGrid();
	  moved = true;
	}
	
	return moved;
  }
  
  // 合并方块
  function mergeTiles(tiles) {
	if (tiles.length === 0) return Array(GRID_SIZE).fill(null);
	const merged = [];
	let i = 0;
	
	while (i < tiles.length) {
	  if (i < tiles.length - 1 && tiles[i] === tiles[i + 1]) {
		const mergedValue = tiles[i] * 2;
		merged.push(mergedValue);
		updateScore(mergedValue);
		
		if (mergedValue === 2048 && !gameWon && !keepPlaying) {
		  gameWon = true;
		  gameWinMessage.classList.add('active');
		}
		
		i += 2;
	  } else {
		merged.push(tiles[i]);
		i += 1;
	  }
	}
	
	while (merged.length < GRID_SIZE) {
	  merged.push(null);
	}
	
	return merged;
  }
  
  // 检查游戏结束
  function checkGameOver() {
	// 检查空位
	for (let row = 0; row < GRID_SIZE; row++) {
	  for (let col = 0; col < GRID_SIZE; col++) {
		if (grid[row][col] === null) return false;
	  }
	}
	
	// 检查相邻合并可能
	for (let row = 0; row < GRID_SIZE; row++) {
	  for (let col = 0; col < GRID_SIZE; col++) {
		const value = grid[row][col];
		if (col < GRID_SIZE - 1 && grid[row][col + 1] === value) return false;
		if (row < GRID_SIZE - 1 && grid[row + 1][col] === value) return false;
	  }
	}
	
	gameOver = true;
	gameOverMessage.classList.add('active');
	return true;
  }
  
  // 键盘控制（修复按键响应bug）
  document.addEventListener('keydown', (e) => {
	if (gameOver && !keepPlaying) return;
	
	let direction = null;
	switch (e.key) {
	  case 'ArrowUp':
	  case 'w':
	  case 'W':
		direction = 'up';
		break;
	  case 'ArrowDown':
	  case 's':
	  case 'S':
		direction = 'down';
		break;
	  case 'ArrowLeft':
	  case 'a':
	  case 'A':
		direction = 'left';
		break;
	  case 'ArrowRight':
	  case 'd':
	  case 'D':
		direction = 'right';
		break;
	  default:
		return;
	}
	
	e.preventDefault();
	const moved = moveTiles(direction);
	if (moved) {
	  setTimeout(() => {
		generateRandomTile();
		if (!keepPlaying) checkGameOver();
	  }, 200);
	}
  });
  
  // 触摸控制（修复滑动无响应bug）
  gameContainer.addEventListener('touchstart', (e) => {
	touchStartX = e.touches[0].clientX;
	touchStartY = e.touches[0].clientY;
  }, { passive: true });
  
  gameContainer.addEventListener('touchend', (e) => {
	if (gameOver && !keepPlaying) return;
	
	const touchEndX = e.changedTouches[0].clientX;
	const touchEndY = e.changedTouches[0].clientY;
	const dx = touchEndX - touchStartX;
	const dy = touchEndY - touchStartY;
	const threshold = 30; // 增大滑动阈值，避免误触
	
	if (Math.abs(dx) > Math.abs(dy)) {
	  // 水平滑动
	  if (Math.abs(dx) > threshold) {
		const direction = dx > 0 ? 'right' : 'left';
		const moved = moveTiles(direction);
		if (moved) {
		  setTimeout(() => {
			generateRandomTile();
			if (!keepPlaying) checkGameOver();
		  }, 200);
		}
	  }
	} else {
	  // 垂直滑动
	  if (Math.abs(dy) > threshold) {
		const direction = dy > 0 ? 'down' : 'up';
		const moved = moveTiles(direction);
		if (moved) {
		  setTimeout(() => {
			generateRandomTile();
			if (!keepPlaying) checkGameOver();
		  }, 200);
		}
	  }
	}
  }, { passive: true });
  
  // 重新开始游戏
  function restartGame() {
	initGrid();
	tileContainer.innerHTML = '';
	score = 0;
	scoreElement.textContent = '0';
	gameOver = false;
	gameWon = false;
	keepPlaying = false;
	gameOverMessage.classList.remove('active');
	gameWinMessage.classList.remove('active');
	
	// 确保生成两个初始方块
	setTimeout(() => {
	  generateRandomTile();
	  setTimeout(generateRandomTile, 100);
	}, 50);
  }
  
  // 绑定按钮事件（修复按钮无响应）
  restartButton.addEventListener('click', restartGame);
  retryButton.addEventListener('click', restartGame);
  winRetryButton.addEventListener('click', restartGame);
  keepPlayingButton.addEventListener('click', () => {
	keepPlaying = true;
	gameWinMessage.classList.remove('active');
  });
  
  // 窗口大小变化时重新渲染
  window.addEventListener('resize', () => {
	if (grid.length > 0) updateGrid();
  });
  
  // 初始化游戏
  restartGame();
});
</script>
</body>
</html>
